services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: kfabric
      POSTGRES_USER: kfabric
      POSTGRES_PASSWORD: kfabric
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"

  qdrant:
    image: qdrant/qdrant:v1.12.5
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  api:
    build: .
    env_file:
      - .env.example
    environment:
      KFABRIC_DATABASE_URL: postgresql+psycopg://kfabric:kfabric@postgres:5432/kfabric
      KFABRIC_REDIS_URL: redis://redis:6379/0
      KFABRIC_RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672//
      KFABRIC_QDRANT_URL: http://qdrant:6333
      KFABRIC_STORAGE_PATH: /app/storage
    depends_on:
      - postgres
      - redis
      - rabbitmq
      - qdrant
    ports:
      - "8001:8000"

  worker:
    build: .
    command: celery -A kfabric.workers.celery_app.celery_app worker --loglevel=INFO
    env_file:
      - .env.example
    environment:
      KFABRIC_DATABASE_URL: postgresql+psycopg://kfabric:kfabric@postgres:5432/kfabric
      KFABRIC_REDIS_URL: redis://redis:6379/0
      KFABRIC_RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672//
      KFABRIC_QDRANT_URL: http://qdrant:6333
      KFABRIC_STORAGE_PATH: /app/storage
    depends_on:
      - api

volumes:
  postgres_data:
  qdrant_data:

