<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}KFabric{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css" />
    <script defer src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script defer src="https://unpkg.com/alpinejs@3.14.0/dist/cdn.min.js"></script>
  </head>
  <body hx-boost="true">
    <div class="page-shell">
      <header class="site-header">
        <a href="/" class="brand">
          <span class="brand-mark">KF</span>
          <span class="brand-text">
            <strong>KFabric</strong>
            <small>Usine documentaire Python-first</small>
          </span>
        </a>
        <nav class="site-nav">
          <a href="/docs">API</a>
          <a href="/api/v1/version">Version</a>
          <a href="/api/v1/mcp/capabilities">MCP</a>
          {% if request.state.web_authenticated %}
            <span>{{ request.state.current_user.display_name or request.state.current_user.email }}</span>
            <form method="post" action="/web/auth/logout">
              <button type="submit">Déconnexion</button>
            </form>
          {% else %}
            <a href="/auth">Connexion</a>
          {% endif %}
        </nav>
      </header>
      <main>
        {% block content %}{% endblock %}
      </main>
    </div>
  </body>
</html>
